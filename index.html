<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Cryptocurrency Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Crypto Live Tracker</h1>
            <p>Real-time asset validation across top assets</p>
            <button id="refresh-btn" class="action-btn">Force Refresh Rates</button>
        </header>

        <!-- Main Realtime Ledger -->
        <main class="crypto-grid" id="crypto-grid">
            <div class="loading-state">Syncing live blockchain metrics...</div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
